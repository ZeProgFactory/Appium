<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#512BD4"/>
      <stop offset="100%" stop-color="#8A5CF6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#grad)"/>

  <!-- Phone frame (UI automation) -->
  <rect x="36" y="24" width="56" height="80" rx="10" fill="white" opacity="0.95"/>
  <rect x="42" y="34" width="44" height="56" rx="4" fill="#F3F4F6"/>

  <!-- Appium-like node graph -->
  <circle cx="64" cy="50" r="4" fill="#512BD4"/>
  <circle cx="52" cy="66" r="3" fill="#512BD4"/>
  <circle cx="76" cy="66" r="3" fill="#512BD4"/>

  <line x1="64" y1="50" x2="52" y2="66" stroke="#512BD4" stroke-width="2"/>
  <line x1="64" y1="50" x2="76" y2="66" stroke="#512BD4" stroke-width="2"/>

  <!-- Test checkmark -->
  <path d="M50 78 L60 88 L80 64"
        fill="none"
        stroke="#22C55E"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Small top notch (phone detail) -->
  <rect x="54" y="28" width="20" height="3" rx="1.5" fill="#D1D5DB"/>
</svg>