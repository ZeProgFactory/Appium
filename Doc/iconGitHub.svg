<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#512BD4"/>
      <stop offset="100%" stop-color="#8A5CF6"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(10,10)">
    <rect x="0" y="0" width="100" height="100" rx="20" fill="url(#grad)"/>

    <!-- Phone -->
    <rect x="26" y="14" width="48" height="72" rx="9" fill="white" opacity="0.95"/>
    <rect x="32" y="24" width="36" height="50" rx="4" fill="#F3F4F6"/>

    <!-- Nodes -->
    <circle cx="50" cy="40" r="3.5" fill="#512BD4"/>
    <circle cx="40" cy="54" r="3" fill="#512BD4"/>
    <circle cx="60" cy="54" r="3" fill="#512BD4"/>

    <line x1="50" y1="40" x2="40" y2="54" stroke="#512BD4" stroke-width="2"/>
    <line x1="50" y1="40" x2="60" y2="54" stroke="#512BD4" stroke-width="2"/>

    <!-- Checkmark -->
    <path d="M38 66 L46 74 L62 54"
          fill="none"
          stroke="#22C55E"
          stroke-width="3.5"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Notch -->
    <rect x="42" y="18" width="16" height="2.5" rx="1.2" fill="#D1D5DB"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(130,55)">
    <!-- ZPF -->
    <text x="0" y="0"
          font-family="Segoe UI, Inter, Arial, sans-serif"
          font-size="28"
          font-weight="700"
          fill="#111827">
      ZPF
    </text>

    <!-- .UITests -->
    <text x="58" y="0"
          font-family="Segoe UI, Inter, Arial, sans-serif"
          font-size="28"
          font-weight="400"
          fill="#374151">
      .UITests
    </text>

    <!-- Tagline -->
    <text x="0" y="28"
          font-family="Segoe UI, Inter, Arial, sans-serif"
          font-size="12"
          fill="#6B7280">
      Appium helpers for MSTest
    </text>
  </g>
</svg>